<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- skill-manager mark: Three flowing orbital paths converging on a central node
       Represents multiple AI agent skills being orchestrated and managed from one hub -->

  <!-- Outer orbital ring — widest arc, represents the ecosystem -->
  <path d="M96 256 C96 148, 148 80, 256 80 C364 80, 432 160, 432 256" stroke="#00ff41" stroke-width="28" stroke-linecap="round" fill="none"/>

  <!-- Middle orbital path — dynamic curve crossing through center -->
  <path d="M432 256 C432 348, 372 432, 256 432 C140 432, 80 348, 80 256" stroke="#00ff41" stroke-width="28" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- Inner flowing path — tight curve suggesting management/control -->
  <path d="M192 160 C224 128, 288 128, 320 160 C360 200, 360 312, 320 352 C288 384, 224 384, 192 352 C152 312, 152 200, 192 160" stroke="#00ff41" stroke-width="20" stroke-linecap="round" fill="none" opacity="0.35"/>

  <!-- Central hub node — the manager -->
  <circle cx="256" cy="256" r="32" fill="#00ff41"/>

  <!-- Skill nodes on the orbital paths -->
  <circle cx="96" cy="256" r="18" fill="#00ff41" opacity="0.8"/>
  <circle cx="432" cy="256" r="18" fill="#00ff41" opacity="0.8"/>
  <circle cx="256" cy="80" r="14" fill="#00cc33"/>
  <circle cx="256" cy="432" r="14" fill="#00cc33"/>

  <!-- Satellite micro-nodes -->
  <circle cx="148" cy="120" r="8" fill="#00ff41" opacity="0.4"/>
  <circle cx="376" cy="392" r="8" fill="#00ff41" opacity="0.4"/>
</svg>
